paths:
  startv_root: /Users/samuel/Documents/StarTV

avatars:
  rotation:
    - tim
    - leon
    - chris
  tim:
    display_name: Tim
    elevenlabs_voice_name: Philip, friendly voice
    elevenlabs_voice_id: ""  # or ELEVENLABS_VOICE_TIM in ~/.starnews/.env
    heygen_avatar_id: ""     # or HEYGEN_AVATAR_TIM — run: starnews heygen-avatars
    heygen_template_id: ""   # or HEYGEN_TEMPLATE_TIM — template must have an audio variable
  leon:
    display_name: Leon
    elevenlabs_voice_name: Odeon
    elevenlabs_voice_id: ""
    heygen_avatar_id: ""
    heygen_template_id: ""
  chris:
    display_name: Chris
    elevenlabs_voice_name: Hans-Peter Lorenz – Modern News Voice
    elevenlabs_voice_id: ""
    heygen_avatar_id: ""
    heygen_template_id: ""

gemini:
  model: gemini-2.5-flash
  prompt_file: prompts/gemini_script.txt

elevenlabs:
  model_id: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true

heygen:
  poll_interval_seconds: 15
  poll_timeout_seconds: 1800
  background_color: "#00B140"  # green screen; used when rendering without a template
  dimension:
    width: 1920
    height: 1080

web:
  host: 127.0.0.1
  port: 8765

state_file: ~/.starnews/state.json
