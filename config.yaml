paths:
  startv_root: /Users/samuel/Documents/StarTV

avatars:
  rotation:
    - tim
    - leon
    - chris
  tim:
    display_name: Tim
    elevenlabs_voice_name: Philip, friendly voice
    heygen_draft_name: Tim 02.07
  leon:
    display_name: Leon
    elevenlabs_voice_name: Odeon
    heygen_draft_name: Leo 30.06
  chris:
    display_name: Chris
    elevenlabs_voice_name: Hans-Peter Lorenz – Modern News Voice
    heygen_draft_name: Chris_01.07

gemini:
  model: gemini-2.5-flash
  prompt_file: prompts/gemini_script.txt

elevenlabs:
  model_id: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true

heygen:
  # manual = pipeline stops after ElevenLabs; you upload MP3 in HeyGen (best draft look)
  # auto   = pipeline tries HeyGen API lip-sync (may not match draft framing)
  mode: manual
  poll_interval_seconds: 15
  poll_timeout_seconds: 1800
  background_color: "#00B140"
  fit: cover
  dimension:
    width: 1920
    height: 1080

web:
  host: 127.0.0.1
  port: 8765

state_file: ~/.starnews/state.json
